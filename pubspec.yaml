name: agent_str
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  shared_preferences: ^2.5.4
  crypto: ^3.0.7
  encrypt: ^5.0.3
  ed25519_edwards: ^0.3.1
  web_socket_channel: ^3.0.3
  hex: ^0.2.0
  uuid: ^4.5.1
  fluttertoast: ^8.2.10
  bech32: ^0.2.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1
  flutter_svg: ^2.0.10+1
  http: ^1.1.0
  intl: ^0.19.0
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.5
  record: ^6.1.1
  just_audio: ^0.10.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
